# ─────────────────────────────────────────────────────────────
#  Site configuration
#
#  This file is your site's control panel. Most things you'll
#  want to change day-to-day live under `author:` below.
#
#  After editing this file you must restart `jekyll serve`
#  locally for changes to take effect (GitHub Pages rebuilds
#  automatically on push).
# ─────────────────────────────────────────────────────────────

# Where the site lives.
#  - Project site (current):  url = https://tylergan.github.io , baseurl = "/boamm"
#  - Root user site later:    url = https://tylergan.github.io , baseurl = ""
# To migrate to a tylergan.github.io repo, just set baseurl to "" — nothing else changes.
url: "https://tylergan.github.io"
baseurl: "/boamm"

title: "Tyler Gan"
tagline: "Blog of a Messy Mind"
description: >-
  Blog of a Messy Mind — a personal log of what I'm learning as a software
  engineer at Canva, written to think clearly and consolidate the day.

# Everything about you. The about page and headers read from here.
author:
  name: "Tyler Gan"
  role: "Associate Software Engineer"
  company: "Canva"
  location: "Sydney, Australia"
  # Short first-person intro shown on the home hero and about page.
  intro: >-
    I'm a software engineer at Canva working on infrastructure and platform
    enablement. I use this space to reflect on what I'm learning, slow down,
    and turn the day's work into something I actually understand.
  # These phrases get "typed out" in the hero animation. Add/remove freely.
  typed:
    - "consolidating what I learn, one entry at a time."
    - "straight yapping."
    - "trying to untangle spaghetti thoughts."
    - "enjoying my time learning and growing."

# Social / contact links. Leave a value blank ("") to hide that link.
social:
  github: "tylergan"          # username only
  linkedin: "tylergan"        # linkedin vanity (linkedin.com/in/tylergan)
  email: ""                   # EDIT ME — add a public email if you want one shown
  twitter: ""

# ── Build settings (you usually won't touch these) ──────────────
markdown: kramdown
highlighter: rouge
permalink: /writing/:year/:month/:title/
timezone: Australia/Sydney

kramdown:
  syntax_highlighter: rouge
  input: GFM
  hard_wrap: false

# Default front matter so new posts need almost no boilerplate.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
    values:
      layout: page

sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .jekyll-cache

plugins:
  - jekyll-feed
  - jekyll-seo-tag
